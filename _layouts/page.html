---
layout: default
---
<article class="page-content">
  {% if page.hero_image %}
  <div class="page-hero" style="background-image: url('{{ page.hero_image | relative_url }}');">
    <h1>{{ page.title }}</h1>
  </div>
  {% else %}
  <div class="page-header">
    <h1>{{ page.title }}</h1>
  </div>
  {% endif %}

  <div class="page-body">
    {{ content }}
  </div>
</article>
